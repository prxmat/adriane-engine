name: unit

# Always runs (cheap, no services): typecheck + test + lint across every workspace
# (packages/* and plugin/mcp).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: unit-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@1.96.0
      - run: pnpm install --frozen-lockfile
      # The SDK is Rust-only (no TS fallback): tests run graphs on the native engine, so
      # build the napi addon first — `@adriane-ai/napi` loads it from crates/bindings.
      # Build via cargo (scripts/build-napi.sh), NOT `napi build` (@napi-rs/cli v2), which cannot
      # compile a napi-derive-3 crate. The CLI v3 migration is a release-pipeline follow-up; tests
      # only need a loadable single-platform .node, which the cargo build produces.
      - name: Build napi addon
        run: bash scripts/build-napi.sh
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm lint
