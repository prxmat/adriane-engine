name: unit

# Always runs (cheap, no services): typecheck + test + lint across every workspace
# (packages/* and plugin/mcp).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: unit-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@1.96.0
      - run: pnpm install --frozen-lockfile
      # The SDK is Rust-only (no TS fallback): tests run graphs on the native engine, so
      # build the napi addon first — `@adriane-ai/napi` loads it from crates/bindings.
      - name: Build napi addon
        working-directory: crates/bindings
        run: pnpm exec napi build --platform
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm lint
