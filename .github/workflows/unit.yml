name: unit

# Always runs (cheap, no services): typecheck + test + lint across every workspace
# (packages/* and plugin/mcp).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: unit-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm lint
