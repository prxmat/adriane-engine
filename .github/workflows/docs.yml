# Build the Docusaurus documentation site and deploy it to GitHub Pages.
# Serves at https://prxmat.github.io/adriane-engine/ (baseUrl /adriane-engine/).
# One-time setup: repo Settings -> Pages -> Source = "GitHub Actions".
name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v6
        with:
          # Create + configure the Pages site (source: GitHub Actions) on first run,
          # so no manual Settings -> Pages toggle is needed.
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs-site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
