name: coverage

# JS/TS test coverage (vitest + @vitest/coverage-v8 provider) across the
# workspace, with the HTML/JSON report uploaded as a build artifact.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@1.96.0
      - run: pnpm install --frozen-lockfile
      # The SDK is Rust-only (no TS fallback): tests run graphs on the native engine, so
      # build the napi addon first — `@adriane-ai/napi` loads it from crates/bindings.
      # Build via cargo (scripts/build-napi.sh), NOT `napi build` (@napi-rs/cli v2), which cannot
      # compile a napi-derive-3 crate. The CLI v3 migration is a release-pipeline follow-up.
      - name: Build napi addon
        run: bash scripts/build-napi.sh
      # @adriane-ai/verify imports the @adriane-ai/graph-sdk BUNDLE (dist), not its source — so its
      # vitest project needs the bundle present, AND graph-sdk's dist re-exports @adriane-ai/model-core
      # (its one external, non-inlined dep) which must also be built. The unit job gets the whole dist
      # chain via turbo's ^build; the raw `vitest run --coverage` here does not, so build graph-sdk +
      # its dependencies through turbo (which honours ^build → model-core first) before the run.
      # --force: model-core#build has a misconfigured `outputs` key (turbo warns it captures no
      # files), so a turbo cache HIT would restore an empty dist. Force a real build so dist/ exists.
      - name: Build graph-sdk + deps (resolved by @adriane-ai/verify tests)
        run: pnpm exec turbo run build --filter=@adriane-ai/graph-sdk --force
      - name: Run tests with coverage
        run: pnpm test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn
